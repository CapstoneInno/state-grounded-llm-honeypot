name: CI

on:
  push:

  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r middleware/requirements.txt ruff

      - name: Run linter
        run: ruff check .

      - name: Run unit tests
        working-directory: middleware
        run: python -m pytest -q -m "not integration"

  quality-and-build:
    needs: fast-checks
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker compose config
        run: docker compose config

      - name: Build application
        run: docker compose build middleware cowrie dashboard


  deploy:
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          if [ -f .env.example ] && [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Deploy
        run: |
          set -e
          docker compose down --remove-orphans || true
          docker compose up -d --build --force-recreate

      - name: Check deployment
        shell: bash
        run: |
          set -e
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/healthz; then
              docker compose ps
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color --tail=100
          exit 1
