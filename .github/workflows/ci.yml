name: CI

on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: 'pip'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r middleware/requirements.txt
      - name: Run tests
        working-directory: middleware
        run: |
          pytest
      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker-compose file
        run: docker compose config
      - name: Build middleware Docker image
        run: docker build -f middleware/Dockerfile -t sglh-middleware ./middleware

      - name: Build Cowrie Docker image
        run: docker build -f cowrie/Dockerfile -t sglh-cowrie ./cowrie
  