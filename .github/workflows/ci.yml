name: CI

on:
  push:

  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r middleware/requirements.txt ruff

      - name: Run linter
        run: ruff check .

      - name: Run unit tests
        working-directory: middleware
        run: python -m pytest -q

  quality-and-build:
    needs: fast-checks
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate docker compose config
        run: docker compose config

      - name: Build middleware image
        run: docker build -f middleware/Dockerfile -t sglh-middleware ./middleware

      - name: Build Cowrie image
        run: docker build -f cowrie/Dockerfile -t sglh-cowrie ./cowrie

  deploy:
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          if [ -f .env.example ] && [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Deploy
        run: |
          set -e
          docker compose down --remove-orphans || true
          docker compose up -d --build --force-recreate
