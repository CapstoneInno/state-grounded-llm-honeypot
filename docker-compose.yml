# State-Grounded LLM Honeypot — full self-hosted stack, one command.
#
# Model weights are pulled automatically at startup by the ollama-pull init
# container.  The pinned model is set in .env via OLLAMA_MODEL.

services:
  # --- local LLM runtime ------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: sglh-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama   # model cache (git-ignored, not in repo)
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- model pull init container (auto-pull at startup) ------------------
  ollama-pull:
    image: ollama/ollama:latest
    container_name: sglh-ollama-pull
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: |
      echo "==> Pulling ${OLLAMA_MODEL:-qwen2.5:3b}..." &&
      ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} &&
      echo "==> Warming up ${OLLAMA_MODEL:-qwen2.5:3b}..." &&
      curl -s -X POST http://ollama:11434/api/generate \
        -H "Content-Type: application/json" \
        -d "{\"model\": \"${OLLAMA_MODEL:-qwen2.5:3b}\", \"prompt\": \"hi\", \"stream\": false, \"keep_alive\": -1}" &&
      echo "==> Model ready"
    restart: on-failure

  # --- state-tracking middleware + dashboard API -------------------------
  middleware:
      build:
        context: .
        dockerfile: dashboard/backend/Dockerfile
      container_name: sglh-middleware
      env_file: .env
      environment:
        - OLLAMA_HOST=http://ollama:11434
        - MIDDLEWARE_BRIDGE_PORT=8000
        - MIDDLEWARE_EVENTS_LOG=/var/log/sglh/events.json
        - MIDDLEWARE_LOG_LEVEL=INFO
      ports:
        - "127.0.0.1:8000:8000"
      volumes:
        - sglh-events:/var/log/sglh
      depends_on:
        ollama:
          condition: service_healthy
        ollama-pull:
          condition: service_completed_successfully
      restart: unless-stopped
  # --- Cowrie honeypot (LLM backend → local Ollama) --------------------
  cowrie:
    build:
      context: ./cowrie
      dockerfile: Dockerfile
    container_name: sglh-cowrie
    env_file: .env
    ports:
      - "2222:2222"
      - "2223:2223"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      middleware:
        condition: service_started
    volumes:
      # NOTE: Cowrie's actual install root is /cowrie/cowrie-git (the base
      # image's WORKDIR), so its real data dir -- SSH host keys, session
      # logs, downloads -- lives at /cowrie/cowrie-git/var, NOT /cowrie/var.
      # This was previously mounted at the wrong path, so an anonymous
      # volume (from the base image's own VOLUME declaration) silently
      # backed the real data dir and got discarded on every full
      # recreate -- that's why the SSH host key kept regenerating.
      - cowrie-var:/cowrie/cowrie-git/var
    restart: unless-stopped
  # --- admin dashboard (React frontend) ---
  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: sglh-dashboard
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - middleware
    restart: unless-stopped

volumes:
  ollama-models:
  cowrie-var:
  sglh-events:
